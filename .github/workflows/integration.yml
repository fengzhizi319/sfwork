name: sfwork Integration

on:
  push:
    branches: [main, master]
  schedule:
    # 每晚 02:00 UTC 运行一次完整集成构建
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-secretpad-backend:
    name: Build SecretPad Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sfwork workspace
        uses: actions/checkout@v4

      - name: Clone sub-repositories
        run: bash scripts/clone-repos.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build SecretPad backend jar
        run: |
          cd secretpad
          mvn clean package -DskipTests -Dfile.encoding=UTF-8

      - name: Upload secretpad.jar
        uses: actions/upload-artifact@v4
        with:
          name: secretpad-jar
          path: secretpad/target/secretpad.jar
          retention-days: 7

  build-secretpad-frontend:
    name: Build SecretPad Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sfwork workspace
        uses: actions/checkout@v4

      - name: Clone sub-repositories
        run: bash scripts/clone-repos.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ^8.8
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('secretpad/frontend-src/**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build frontend
        run: |
          cd secretpad/frontend-src
          pnpm bootstrap
          pnpm --filter secretpad build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: secretpad-frontend-dist
          path: secretpad/frontend-src/apps/platform/dist
          retention-days: 7

  dev-env-check:
    name: Development Environment Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sfwork workspace
        uses: actions/checkout@v4

      - name: Clone sub-repositories
        run: bash scripts/clone-repos.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ^8.8
          run_install: false

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: sf310

      - name: Run dev-start environment check
        run: bash scripts/dev-start.sh --check
