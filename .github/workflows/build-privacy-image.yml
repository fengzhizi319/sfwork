name: Build Privacy Image

on:
  push:
    branches: [main, master]
    paths:
      - 'secretflow/**'
      - 'scripts/build-privacy-image.sh'
      - '.github/workflows/build-privacy-image.yml'
      - '.env.example'
  schedule:
    # 每周一 02:00 UTC 构建一次，确保基础镜像更新不会导致构建失败
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  PRIVACY_IMAGE: secretflow/sf-privacy-dev:1.15.0.dev-privacy

jobs:
  build:
    name: Build secretflow/sf-privacy-dev image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sfwork workspace
        uses: actions/checkout@v4

      - name: Clone sub-repositories
        run: bash scripts/clone-repos.sh

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: sf310

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build privacy image
        run: bash scripts/build-privacy-image.sh

      - name: Save image to tar
        run: docker save "$PRIVACY_IMAGE" -o /tmp/privacy-image.tar

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: privacy-image-tar
          path: /tmp/privacy-image.tar
          retention-days: 3

  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: privacy-image-tar
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/privacy-image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.PRIVACY_IMAGE }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.PRIVACY_IMAGE }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: privacy-image-tar
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/privacy-image.tar

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.PRIVACY_IMAGE }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: privacy-image-sbom
          path: sbom.spdx.json
          retention-days: 30
